<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NetWatch Security System — Portal Login" />
  <title>NetWatch Portal Login</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- CSS Frameworks -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <style>
    :root {
      --nw-bg-page: #f8fafc;
      --nw-bg-card: #ffffff;
      --nw-border: #e2e8f0;
      --nw-text-primary: #0f172a;
      --nw-text-muted: #64748b;
      --nw-accent: #2563eb;
      --nw-accent-glow: rgba(37, 99, 235, 0.15);
      --nw-danger: #dc2626;
      --nw-success: #16a34a;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--nw-bg-page);
      color: var(--nw-text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Tech/SOC grid pattern background */
      background-image: 
        radial-gradient(rgba(37, 99, 235, 0.04) 1.5px, transparent 1.5px),
        radial-gradient(rgba(37, 99, 235, 0.04) 1.5px, var(--nw-bg-page) 1.5px);
      background-size: 24px 24px;
      background-position: 0 0, 12px 12px;
      padding: 20px;
    }

    .nw-login-container {
      width: 100%;
      max-width: 440px;
    }

    .nw-card {
      background: var(--nw-bg-card);
      border: 1px solid var(--nw-border);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
      padding: 36px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .nw-card:hover {
      box-shadow: 0 12px 35px rgba(15, 23, 42, 0.08);
    }

    .nw-brand-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--nw-accent), #6366f1);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
      margin: 0 auto 16px;
      box-shadow: 0 4px 12px var(--nw-accent-glow);
    }

    .nw-brand-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--nw-text-primary);
      text-align: center;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .nw-brand-subtitle {
      font-size: 13px;
      color: var(--nw-text-muted);
      text-align: center;
      margin-bottom: 28px;
      font-weight: 400;
    }

    .form-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--nw-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .form-control {
      font-size: 14px;
      padding: 10px 14px;
      border: 1px solid var(--nw-border);
      border-radius: 8px;
      color: var(--nw-text-primary);
      background-color: var(--nw-bg-page);
      transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
    }

    .form-control:focus {
      border-color: var(--nw-accent);
      box-shadow: 0 0 0 3px var(--nw-accent-glow);
      outline: 0;
    }

    /* Input group design for password toggle */
    .input-group {
      position: relative;
    }

    .input-group .form-control {
      border-top-right-radius: 8px !important;
      border-bottom-right-radius: 8px !important;
    }

    .nw-toggle-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--nw-text-muted);
      cursor: pointer;
      z-index: 10;
      padding: 0;
      font-size: 16px;
      display: flex;
      align-items: center;
      transition: color 0.15s ease;
    }

    .nw-toggle-btn:hover {
      color: var(--nw-text-primary);
    }

    .nw-login-btn {
      background: linear-gradient(135deg, var(--nw-accent), #6366f1);
      border: none;
      color: white;
      font-size: 14px;
      font-weight: 600;
      padding: 12px;
      border-radius: 8px;
      width: 100%;
      margin-top: 10px;
      box-shadow: 0 4px 12px var(--nw-accent-glow);
      transition: transform 0.1s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .nw-login-btn:hover {
      box-shadow: 0 6px 16px var(--nw-accent-glow);
      opacity: 0.95;
    }

    .nw-login-btn:active {
      transform: scale(0.98);
    }

    .nw-alert {
      font-size: 13px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(220, 38, 38, 0.15);
      background-color: rgba(220, 38, 38, 0.05);
      color: var(--nw-danger);
      margin-bottom: 20px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .nw-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--nw-text-muted);
    }
  </style>
</head>
<body>

<div class="nw-login-container">
  <div class="nw-card">
    
    <!-- Branding Header -->
    <div class="nw-brand-icon">
      <i class="bi bi-shield-fill-check"></i>
    </div>
    <div class="nw-brand-title">NetWatch</div>
    <div class="nw-brand-subtitle">Network Traffic Monitoring & DDoS Detection</div>

    <!-- Error Alerts -->
    {% if error %}
    <div class="nw-alert">
      <i class="bi bi-exclamation-triangle-fill" style="margin-top: 2px;"></i>
      <div>{{ error }}</div>
    </div>
    {% endif %}

    <!-- Form -->
    <form method="POST">
      {% csrf_token %}

      <!-- Username -->
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <div class="input-group">
          <input type="text" id="username" name="username" class="form-control" placeholder="Enter username" autocomplete="username" required>
        </div>
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label for="password" class="form-label">Password</label>
        <div class="input-group">
          <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" autocomplete="current-password" required style="padding-right: 40px;">
          <button type="button" id="password-toggle" class="nw-toggle-btn" aria-label="Toggle password visibility">
            <i class="bi bi-eye-fill" id="toggle-icon"></i>
          </button>
        </div>
      </div>

      <!-- Remember Me & Reset Link Row -->
      <div class="d-flex align-items-center justify-content-between mb-4" style="font-size: 13px;">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="remember-me" style="cursor: pointer;">
          <label class="form-check-label text-muted" for="remember-me" style="cursor: pointer; user-select: none;">
            Remember credentials
          </label>
        </div>
      </div>

      <!-- Action Button -->
      <button type="submit" class="nw-login-btn">
        <i class="bi bi-box-arrow-in-right me-2"></i>
        Access Portal
      </button>

    </form>
  </div>

  <!-- Footer Info -->
  <div class="nw-footer">
    &copy; 2026 NetWatch Security System &bull; Final Project
    <div class="text-muted mt-1" style="font-size: 10px;">Django 6 &bull; SQLite &bull; Bootstrap 5</div>
  </div>
</div>

<!-- Password Visibility Script -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const passwordInput = document.getElementById('password');
    const toggleButton = document.getElementById('password-toggle');
    const toggleIcon = document.getElementById('toggle-icon');

    if (passwordInput && toggleButton && toggleIcon) {
      toggleButton.addEventListener('click', function() {
        const isPassword = passwordInput.getAttribute('type') === 'password';
        
        // Toggle input type
        passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
        
        // Toggle icon classes
        toggleIcon.className = isPassword ? 'bi bi-eye-slash-fill' : 'bi bi-eye-fill';
      });
    }
  });
</script>
</body>
</html>
