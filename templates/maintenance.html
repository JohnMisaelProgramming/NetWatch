{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Maintenance - NetWatch</title>
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}" />
  <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/apple-touch-icon.png' %}" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    :root {
      --nw-bg-page: #0b0f19;
      --nw-bg-card: #111827;
      --nw-border: #1f2937;
      --nw-text-primary: #f3f4f6;
      --nw-text-muted: #9ca3af;
      --nw-warning: #f59e0b;
      --nw-accent: #3b82f6;
    }
    body {
      background-color: var(--nw-bg-page);
      color: var(--nw-text-primary);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .maintenance-container {
      background-color: var(--nw-bg-card);
      border: 1px solid var(--nw-border);
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    .lock-icon {
      font-size: 64px;
      color: var(--nw-warning);
      margin-bottom: 20px;
      animation: pulse-glow 2s infinite ease-in-out;
      display: inline-block;
    }
    @keyframes pulse-glow {
      0% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 10px rgba(245, 158, 11, 0.3)); }
      100% { transform: scale(1); opacity: 0.9; }
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 12px;
      color: var(--nw-text-primary);
    }
    p {
      font-size: 14px;
      color: var(--nw-text-muted);
      line-height: 1.6;
      margin: 0 0 24px;
    }
    .btn {
      display: inline-block;
      background-color: var(--nw-accent);
      color: white;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 24px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .btn:hover {
      background-color: #2563eb;
    }
  </style>
</head>
<body>
  <div class="maintenance-container">
    <div class="lock-icon">
      <i class="bi bi-shield-lock"></i>
    </div>
    <h1>System Under Maintenance</h1>
    <p>{{ message }}</p>
    <a href="/login/" class="btn">Staff Authentication Login</a>
  </div>
</body>
</html>
